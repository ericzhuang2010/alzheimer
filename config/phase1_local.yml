project:
  root: "."
  analysis_config: config/analysis_parameters.yml
  manifest: config/phase1_rds_manifest.tsv

inputs:
  expression_root: data/processed
  clinical_csv: data/processed/ROSMAP_clinical.csv
  cell_metadata_tsv: data/processed/cell.meta.data.tsv

outputs:
  root: results/local_pilot

scope:
  rds_ids: [vasculature]
  pilot: true
  allowed_task_modes:
    - environment
    - audit
    - cohort
    - annotations
    - qc
    - normalize
    - descriptive
    - pseudobulk
    - contrasts
    - pseudobulk_de
    - mast
    - mito_fraction
    - pathways
    - similarity
    - sensitivity
    - power
    - validate
    - figures

pilot_limits:
  similarity_permutations: 100
  sensitivity_bootstrap_repetitions: 50
  power_repetitions: 10
  required_status: nonfinal_smoke_test
