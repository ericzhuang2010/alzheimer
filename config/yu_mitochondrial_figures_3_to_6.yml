schema_version: yu_mitochondrial_figures_config_v2

inputs:
  expected_similarity_status_schema: mitochondrial_similarity_status_v1
  expected_similarity_checks_schema: similarity_checks_v1
  expected_similarity_artifacts_schema: similarity_artifacts_v1
  expected_pathway_status_schema: mitochondrial_pathway_status_v1
  expected_pathway_checks_schema: pathway_checks_v1
  expected_pathway_artifacts_schema: pathway_artifacts_v1
  expected_similarity_panel_schema: mitochondrial_similarity_panel_data_v1
  expected_pathway_panel_schema: mitochondrial_pathway_panel_data_v1
  expected_pathway_ora_schema: similarity_tail_pathway_ora_v1
  expected_query_manifest_schema: pathway_query_manifest_v1
  expected_downstream_manifest_schema: downstream_panel_manifest_v1
  expected_reference_manifest_schema: pathway_reference_manifest_v1
  expected_validation_status: validated_complete
  expected_similarity_permutations: 10000
  expected_comparison_families: 6
  expected_downstream_definitions: 27
  expected_similarity_panel_rows: 3780
  expected_pathway_panel_rows: 75411
  expected_pathway_ora_rows: 102336
  expected_query_manifest_rows: 24

primary:
  profile_id: primary_yu_mito
  analysis_universe: core_mito
  pathway_collection: msigdb_c2_cp_v2026_1
  collection_release: 2026.1.Hs
  execution_label: minerva_production

display:
  pathway_fdr_threshold: 0.05
  max_pathways_per_query: 15
  pathway_label_width: 42
  score_digits: 3
  base_font_size: 8
  pathway_viridis_option: D
  empty_pathway_message: "No tested pathways share a gene with this 200-gene tail"

state_pair_groups:
  - pair_group: Same
    group_order: 1
    low_color: "#F7FCF5"
    high_color: "#238B45"
  - pair_group: Different
    group_order: 2
    low_color: "#FFF5EB"
    high_color: "#E6550D"
  - pair_group: Opposite
    group_order: 3
    low_color: "#FCFBFD"
    high_color: "#7A0177"

state_pairs:
  - pair_column: S_pos1_pos1
    pair_label: "(+1,+1)"
    pair_group: Same
    pair_order: 1
    display_in_panel_a: true
  - pair_column: S_neg1_neg1
    pair_label: "(-1,-1)"
    pair_group: Same
    pair_order: 2
    display_in_panel_a: true
  - pair_column: S_pos1_0
    pair_label: "(+1,0)"
    pair_group: Different
    pair_order: 3
    display_in_panel_a: true
  - pair_column: S_neg1_0
    pair_label: "(-1,0)"
    pair_group: Different
    pair_order: 4
    display_in_panel_a: true
  - pair_column: S_0_pos1
    pair_label: "(0,+1)"
    pair_group: Different
    pair_order: 5
    display_in_panel_a: true
  - pair_column: S_0_neg1
    pair_label: "(0,-1)"
    pair_group: Different
    pair_order: 6
    display_in_panel_a: true
  - pair_column: S_pos1_neg1
    pair_label: "(+1,-1)"
    pair_group: Opposite
    pair_order: 7
    display_in_panel_a: true
  - pair_column: S_neg1_pos1
    pair_label: "(-1,+1)"
    pair_group: Opposite
    pair_order: 8
    display_in_panel_a: true
  - pair_column: S_0_0
    pair_label: "(0,0)"
    pair_group: Neither significant
    pair_order: 9
    display_in_panel_a: false

figures:
  - figure_id: figure03
    figure_number: 3
    title: Sex-shared and sex-divergent mitochondrial transcriptional responses in AD
    width_in: 11
    height_in: 15
    panel_a_fraction: 0.64
    panel_b_fraction: 0.36
    pdf_filename: figure03_mitochondrial_yu_analogue.pdf
    png_filename: figure03_mitochondrial_yu_analogue.png
  - figure_id: figure04
    figure_number: 4
    title: APOE e2-shared and e2-divergent mitochondrial transcriptional responses in AD
    width_in: 11
    height_in: 15
    panel_a_fraction: 0.64
    panel_b_fraction: 0.36
    pdf_filename: figure04_mitochondrial_yu_analogue.pdf
    png_filename: figure04_mitochondrial_yu_analogue.png
  - figure_id: figure05
    figure_number: 5
    title: APOE e4-shared and e4-divergent mitochondrial transcriptional responses in AD
    width_in: 11
    height_in: 15
    panel_a_fraction: 0.64
    panel_b_fraction: 0.36
    pdf_filename: figure05_mitochondrial_yu_analogue.pdf
    png_filename: figure05_mitochondrial_yu_analogue.png
  - figure_id: figure06
    figure_number: 6
    title: APOE-dependent sex divergence in mitochondrial transcriptional responses in AD
    width_in: 12
    height_in: 30
    panel_a_fraction: 0.45
    panel_b_fraction: 0.55
    pdf_filename: figure06_mitochondrial_yu_analogue.pdf
    png_filename: figure06_mitochondrial_yu_analogue.png

